<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan ❤️ Princesa</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#ff77aa,#ffd1e1);overflow-x:hidden}
#start{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff}
.btn{padding:14px 28px;border:none;border-radius:30px;font-size:18px;cursor:pointer}
#main{display:none;padding:20px}
.card{max-width:1000px;margin:auto;background:rgba(255,255,255,.9);padding:25px;border-radius:25px}
#counter{font-size:1.4rem;color:#d81b60;text-align:center;font-weight:bold}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.polaroid{background:#fff;padding:10px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.2)}
.polaroid img{width:100%;height:250px;object-fit:cover}
.heart{position:fixed;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh)}}
#letter{white-space:pre-wrap;line-height:1.8}
</style>
</head>
<body>
<div id="start">
<h1>Nathan ❤️ Princesa</h1>
<p>Algumas histórias são escritas pelo destino. A nossa é a minha favorita.</p>
<button class="btn" onclick="openStory()">Abrir nossa história ❤️</button>
</div>

<div id="main">
<div class="card">
<h2 align="center">⏳ Estamos juntos há</h2>
<div id="counter"></div>

<h2 align="center">🎵 Nossa Música</h2>
<div style="
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
text-align:center;
margin-bottom:20px;
">

<h3 style="margin:0;color:#d81b60;">
🎵 Exagerado
</h3>

<p>Cazuza ❤️</p>

<button onclick="tocarMusica()" class="btn">
▶️ Tocar Música
</button>

</div>

<audio id="musica">
  <source src="musica.mp3" type="audio/mpeg">
</audio>
<h2 align="center">📸 Nossos Momentos</h2>
<div class="gallery">
<div class="polaroid"><img src="foto1.jpg"></div>
<div class="polaroid"><img src="foto2.jpg"></div>
<div class="polaroid"><img src="foto3.jpg"></div>
<div class="polaroid"><img src="foto4.jpg"></div>
<div class="polaroid"><img src="foto5.jpg"></div>
<div class="polaroid"><img src="foto6.jpg"></div>
</div>

<h2 align="center">💌 Para minha Princesa</h2>
<div id="letter"></div>
</div>
</div>

<script>
const startDate = new Date("2022-02-20T00:00:00");

function openStory(){
 document.getElementById('start').style.display='none';
 document.getElementById('main').style.display='block';
}

function updateCounter(){
 const now=new Date();
 let diff=now-startDate;
 const s=Math.floor(diff/1000)%60;
 const m=Math.floor(diff/60000)%60;
 const h=Math.floor(diff/3600000)%24;
 const d=Math.floor(diff/86400000);
 const y=Math.floor(d/365);
 const mo=Math.floor((d%365)/30);
 const da=(d%365)%30;
 document.getElementById('counter').innerHTML=`${y} anos, ${mo} meses, ${da} dias, ${h} horas, ${m} minutos e ${s} segundos ❤️`;
}
setInterval(updateCounter,1000); updateCounter();

function heart(){
 const e=document.createElement('div');
 e.className='heart';
 e.innerHTML='❤️';
 e.style.left=Math.random()*100+'vw';
 e.style.fontSize=(15+Math.random()*25)+'px';
 e.style.animationDuration=(4+Math.random()*5)+'s';
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),9000);
}
setInterval(heart,250);

const text=`Minha Princesa,

Desde 20 de fevereiro de 2022 você tornou minha vida mais feliz.

Obrigado por cada sorriso, cada abraço e cada momento que compartilhamos.

Eu te amo mais do que consigo colocar em palavras.

Com amor,
Nathan ❤️`;

let i=0;
(function type(){
 if(i<text.length){
   document.getElementById('letter').textContent+=text[i++];
   setTimeout(type,40);
 }
})();

function tocarMusica(){

 const musica = document.getElementById("musica");

 musica.currentTime = 28;

 musica.play();

}

</script>
</body>
</html>
